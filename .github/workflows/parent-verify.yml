name: ProdUS Verify

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'cursor/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --runInBand

      - name: Production build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - frontend
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t produs-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t produs-frontend:ci ./frontend
