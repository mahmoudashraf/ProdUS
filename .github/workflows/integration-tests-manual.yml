name: ProdUS Full Verify (Manual)

on:
  workflow_dispatch:
    inputs:
      include_docker:
        description: Build backend and frontend Docker images
        required: true
        default: true
        type: boolean

jobs:
  full-verify:
    name: Full Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend clean test
        working-directory: backend
        run: mvn -B clean test

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npm run type-check

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test -- --runInBand

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Backend Docker image
        if: inputs.include_docker
        run: docker build -t produs-backend:manual ./backend

      - name: Frontend Docker image
        if: inputs.include_docker
        run: docker build -t produs-frontend:manual ./frontend
