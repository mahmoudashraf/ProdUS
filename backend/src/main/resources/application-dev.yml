spring:
  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  liquibase:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

supabase:
  url: https://dev-project.supabase.co
  api-key: dev-anon-key
  service-role-key: dev-service-role-key

app:
  mock-auth:
    enabled: true
  scanner:
    require-runtime-tool-availability: false
    storage:
      retention-cleanup-enabled: false
      export-enabled: true
    providers:
      github:
        enabled: false
        install-url: ${APP_SCANNER_GITHUB_INSTALL_URL:https://github.com/apps/produs-network/installations/new}
        callback-url: ${APP_SCANNER_GITHUB_CALLBACK_URL:http://localhost:8080/api/scanner/connectors/github/callback}
      gitlab:
        enabled: false
        redirect-uri: ${APP_SCANNER_GITLAB_REDIRECT_URI:http://localhost:8080/api/scanner/connectors/gitlab/callback}

aws:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket: produs-dev
    access-key: minioadmin
    secret-key: minioadmin
    presigned-url-duration: 900

logging:
  level:
    root: INFO
    com.produs: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
