spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

supabase:
  url: ${SUPABASE_URL}
  api-key: ${SUPABASE_API_KEY}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

app:
  mock-auth:
    enabled: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:300}
  integrations:
    webhooks:
      payments:
        secret: ${APP_PAYMENT_WEBHOOK_SECRET:}
      signatures:
        secret: ${APP_SIGNATURE_WEBHOOK_SECRET:}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:https://s3.amazonaws.com}
    region: ${AWS_S3_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    presigned-url-duration: ${AWS_PRESIGNED_URL_DURATION:3600}

loomai:
  base-url: ${LOOMAI_BASE_URL:}
  api-key: ${LOOMAI_API_KEY:}
  enabled: ${LOOMAI_ENABLED:false}
  timeout-ms: ${LOOMAI_TIMEOUT_MS:2500}

logging:
  level:
    root: WARN
    com.produs: INFO
    org.springframework.web: WARN
  file:
    name: /var/log/produs/application.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
