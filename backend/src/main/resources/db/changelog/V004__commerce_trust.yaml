  - changeSet:
      id: 304
      author: produs
      changes:
        - createTable:
            tableName: team_reputation_events
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: team_id, type: UUID, constraints: { nullable: false } }
              - column: { name: workspace_id, type: UUID }
              - column: { name: created_by, type: UUID, constraints: { nullable: false } }
              - column: { name: event_type, type: VARCHAR(50), constraints: { nullable: false } }
