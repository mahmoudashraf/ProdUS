        - createIndex:
            tableName: normalized_findings
            indexName: idx_normalized_findings_severity
            columns:
              - column: { name: severity }
        - createIndex:
            tableName: normalized_findings
            indexName: idx_normalized_findings_fingerprint
            columns:
              - column: { name: fingerprint }

