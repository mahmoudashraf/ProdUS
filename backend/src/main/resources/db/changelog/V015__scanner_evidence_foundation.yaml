databaseChangeLog:
  - changeSet:
      id: 1500
      author: produs
      changes:
        - createTable:
            tableName: scan_sources
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: owner_id, type: UUID, constraints: { nullable: false } }
              - column: { name: product_profile_id, type: UUID, constraints: { nullable: false } }
              - column: { name: workspace_id, type: UUID }
              - column: { name: provider_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: display_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: external_reference, type: VARCHAR(1000) }
              - column: { name: authorization_status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: scope_note, type: TEXT }
              - column: { name: created_by, type: UUID, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: scan_sources
            baseColumnNames: owner_id
            constraintName: fk_scan_sources_owner
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_sources
            baseColumnNames: product_profile_id
            constraintName: fk_scan_sources_product
            referencedTableName: product_profiles
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_sources
            baseColumnNames: workspace_id
            constraintName: fk_scan_sources_workspace
            referencedTableName: project_workspaces
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_sources
            baseColumnNames: created_by
            constraintName: fk_scan_sources_created_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: scan_sources
            indexName: idx_scan_sources_product
            columns:
              - column: { name: product_profile_id }
        - createIndex:
            tableName: scan_sources
            indexName: idx_scan_sources_workspace
            columns:
              - column: { name: workspace_id }

  - changeSet:
      id: 1501
      author: produs
      changes:
        - createTable:
            tableName: scan_runs
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: scan_source_id, type: UUID, constraints: { nullable: false } }
              - column: { name: product_profile_id, type: UUID, constraints: { nullable: false } }
              - column: { name: workspace_id, type: UUID }
              - column: { name: trigger_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: depth, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: started_at, type: TIMESTAMP }
              - column: { name: completed_at, type: TIMESTAMP }
              - column: { name: requested_by, type: UUID, constraints: { nullable: false } }
              - column: { name: failure_summary, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: scan_runs
            baseColumnNames: scan_source_id
            constraintName: fk_scan_runs_source
            referencedTableName: scan_sources
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_runs
            baseColumnNames: product_profile_id
            constraintName: fk_scan_runs_product
            referencedTableName: product_profiles
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_runs
            baseColumnNames: workspace_id
            constraintName: fk_scan_runs_workspace
            referencedTableName: project_workspaces
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scan_runs
            baseColumnNames: requested_by
            constraintName: fk_scan_runs_requested_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: scan_runs
            indexName: idx_scan_runs_product_status
            columns:
              - column: { name: product_profile_id }
              - column: { name: status }
        - createIndex:
            tableName: scan_runs
            indexName: idx_scan_runs_workspace
            columns:
              - column: { name: workspace_id }

  - changeSet:
      id: 1502
      author: produs
      changes:
        - createTable:
            tableName: tool_runs
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: scan_run_id, type: UUID, constraints: { nullable: false } }
              - column: { name: tool_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: tool_version, type: VARCHAR(255) }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: started_at, type: TIMESTAMP }
              - column: { name: completed_at, type: TIMESTAMP }
              - column: { name: raw_artifact_ref, type: VARCHAR(1000) }
              - column: { name: storage_key, type: VARCHAR(1000) }
              - column: { name: normalized_count, type: INT, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: error_summary, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: tool_runs
            baseColumnNames: scan_run_id
            constraintName: fk_tool_runs_scan_run
            referencedTableName: scan_runs
            referencedColumnNames: id
        - createIndex:
            tableName: tool_runs
            indexName: idx_tool_runs_scan_run
            columns:
              - column: { name: scan_run_id }

