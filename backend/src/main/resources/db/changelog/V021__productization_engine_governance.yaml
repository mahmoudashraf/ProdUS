              - column: { name: description, type: TEXT, constraints: { nullable: false } }
              - column: { name: affected_layer, type: VARCHAR(255) }
              - column: { name: severity, type: VARCHAR(50), defaultValue: MEDIUM, constraints: { nullable: false } }
              - column: { name: confidence_level, type: VARCHAR(50), defaultValue: MEDIUM, constraints: { nullable: false } }
              - column: { name: confidence_basis, type: TEXT }
              - column: { name: source_signal, type: TEXT }
              - column: { name: status, type: VARCHAR(50), defaultValue: OPEN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: product_findings
            baseColumnNames: diagnosis_id
            constraintName: fk_product_findings_diagnosis
            referencedTableName: product_diagnoses
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: product_findings
            baseColumnNames: recommended_module_id
            constraintName: fk_product_findings_recommended_module
            referencedTableName: service_modules
            referencedColumnNames: id
        - createIndex:
            tableName: product_findings
            indexName: idx_product_findings_diagnosis
            columns:
              - column: { name: diagnosis_id }
        - createIndex:
            tableName: product_findings
            indexName: idx_product_findings_severity
            columns:
              - column: { name: severity }

