databaseChangeLog:
  - changeSet:
      id: 2100
      author: produs
      changes:
        - createTable:
            tableName: product_diagnoses
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: product_profile_id, type: UUID, constraints: { nullable: false } }
              - column: { name: requirement_intake_id, type: UUID }
              - column: { name: created_by, type: UUID, constraints: { nullable: false } }
              - column: { name: readiness_score, type: INT, defaultValueNumeric: 50, constraints: { nullable: false } }
              - column: { name: summary, type: TEXT, constraints: { nullable: false } }
              - column: { name: access_signals, type: TEXT }
              - column: { name: status, type: VARCHAR(50), defaultValue: READY, constraints: { nullable: false } }
              - column: { name: ai_ready, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: ai_executed, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: product_diagnoses
            baseColumnNames: product_profile_id
            constraintName: fk_product_diagnoses_product
            referencedTableName: product_profiles
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: product_diagnoses
            baseColumnNames: requirement_intake_id
            constraintName: fk_product_diagnoses_requirement
            referencedTableName: requirement_intakes
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: product_diagnoses
            baseColumnNames: created_by
            constraintName: fk_product_diagnoses_created_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: product_diagnoses
            indexName: idx_product_diagnoses_product
            columns:
              - column: { name: product_profile_id }
        - createIndex:
            tableName: product_diagnoses
            indexName: idx_product_diagnoses_status
            columns:
              - column: { name: status }

  - changeSet:
      id: 2101
      author: produs
      changes:
        - createTable:
            tableName: product_findings
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
