databaseChangeLog:
  - changeSet:
      id: 500
      author: produs
      changes:
        - createTable:
            tableName: evidence_attachments
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: workspace_id, type: UUID, constraints: { nullable: false } }
              - column: { name: deliverable_id, type: UUID }
              - column: { name: dispute_id, type: UUID }
              - column: { name: uploaded_by, type: UUID, constraints: { nullable: false } }
              - column: { name: scope_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: scope_id, type: UUID, constraints: { nullable: false } }
              - column: { name: file_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: storage_key, type: VARCHAR(512), constraints: { nullable: false } }
              - column: { name: file_url, type: TEXT, constraints: { nullable: false } }
              - column: { name: content_type, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: size_bytes, type: BIGINT, constraints: { nullable: false } }
              - column: { name: label, type: VARCHAR(255) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addUniqueConstraint:
            tableName: evidence_attachments
            columnNames: storage_key
            constraintName: uk_evidence_attachments_storage_key
        - addForeignKeyConstraint:
            baseTableName: evidence_attachments
            baseColumnNames: workspace_id
            constraintName: fk_evidence_attachments_workspace
            referencedTableName: project_workspaces
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: evidence_attachments
            baseColumnNames: deliverable_id
            constraintName: fk_evidence_attachments_deliverable
            referencedTableName: deliverables
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: evidence_attachments
            baseColumnNames: dispute_id
            constraintName: fk_evidence_attachments_dispute
            referencedTableName: dispute_cases
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: evidence_attachments
            baseColumnNames: uploaded_by
            constraintName: fk_evidence_attachments_uploaded_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: evidence_attachments
            indexName: idx_evidence_attachments_workspace
            columns:
              - column: { name: workspace_id }
              - column: { name: created_at }
        - createIndex:
            tableName: evidence_attachments
            indexName: idx_evidence_attachments_scope
            columns:
              - column: { name: scope_type }
              - column: { name: scope_id }
              - column: { name: created_at }
