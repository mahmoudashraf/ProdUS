databaseChangeLog:
  - changeSet:
      id: 1300
      author: produs
      changes:
        - createTable:
            tableName: network_formation_posts
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: author_id, type: UUID, constraints: { nullable: false } }
              - column: { name: team_id, type: UUID }
              - column: { name: post_type, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: title, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: body, type: TEXT }
              - column: { name: offered_services, type: TEXT }
              - column: { name: needed_services, type: TEXT }
              - column: { name: working_style, type: VARCHAR(255) }
              - column: { name: timezone, type: VARCHAR(255) }
              - column: { name: package_size, type: VARCHAR(255) }
              - column: { name: status, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: expires_on, type: DATE }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: network_formation_posts
            baseColumnNames: author_id
            constraintName: fk_network_formation_posts_author
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: network_formation_posts
            baseColumnNames: team_id
            constraintName: fk_network_formation_posts_team
            referencedTableName: teams
            referencedColumnNames: id
        - createIndex:
            tableName: network_formation_posts
            indexName: idx_network_formation_posts_status_created
            columns:
              - column: { name: status }
              - column: { name: created_at }

  - changeSet:
      id: 1301
      author: produs
      changes:
        - createTable:
            tableName: network_channels
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
