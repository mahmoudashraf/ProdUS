              - column: { name: name, type: VARCHAR(160), constraints: { nullable: false } }
              - column: { name: description, type: TEXT }
              - column: { name: channel_type, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: color, type: VARCHAR(40) }
              - column: { name: sort_order, type: INT, defaultValueNumeric: 100, constraints: { nullable: false } }
              - column: { name: active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - createIndex:
            tableName: network_channels
            indexName: idx_network_channels_active_sort
            columns:
              - column: { name: active }
              - column: { name: sort_order }

