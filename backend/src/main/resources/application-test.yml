spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  liquibase:
    enabled: false

supabase:
  url: https://test-project.supabase.co
  api-key: test-anon-key
  service-role-key: test-service-role-key

app:
  mock-auth:
    enabled: true
  notifications:
    delivery:
      enabled: true
      scheduler-enabled: false
      email-enabled: true
      push-enabled: false
      email-provider: AUDIT_LOG
      push-provider: AUDIT_LOG
      webhook-secret: test-notification-webhook-secret
  support:
    sla:
      enabled: true
      scheduler-enabled: false
      due-soon-days: 1
  security:
    rate-limit:
      enabled: false
  integrations:
    webhooks:
      payments:
        secret: test-payment-webhook-secret
      signatures:
        secret: test-signature-webhook-secret
  scanner:
    scheduler-enabled: false
    worker-enabled: true
    poll-fixed-delay-ms: 60000
    max-attempts: 1
    default-timeout-seconds: 30
    max-output-bytes: 2000000
    require-runtime-tool-availability: false
    storage:
      raw-artifact-retention-days: 30
      import-payload-retention-days: 30
      evidence-artifact-retention-days: 365
      retention-cleanup-enabled: false
      export-enabled: true
      signed-url-duration-seconds: 300
    providers:
      github:
        enabled: true
        app-id: test-github-app
        client-id: test-github-client
        client-secret: test-github-secret
        private-key-path: ""
        webhook-secret: test-github-webhook-secret
        install-url: https://github.com/apps/produs-test/installations/new
        callback-url: http://localhost:8080/api/scanner/connectors/github/callback
      gitlab:
        enabled: true
        client-id: test-gitlab-client
        client-secret: test-gitlab-secret
        redirect-uri: http://localhost:8080/api/scanner/connectors/gitlab/callback
        webhook-secret: test-gitlab-webhook-secret
        base-url: https://gitlab.com

aws:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket: produs-test
    access-key: test-access-key
    secret-key: test-secret-key
    presigned-url-duration: 300

logging:
  level:
    root: WARN
    com.produs: DEBUG
