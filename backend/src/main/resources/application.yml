server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: produs-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/produs}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  api-key: ${SUPABASE_API_KEY:your-anon-key}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}

app:
  public-api-base-url: ${APP_PUBLIC_API_BASE_URL:}
  mock-auth:
    enabled: ${APP_MOCK_AUTH_ENABLED:false}
    allowed-profiles: ${APP_MOCK_AUTH_ALLOWED_PROFILES:dev,staging}
    allow-production-profile: ${APP_MOCK_AUTH_ALLOW_PRODUCTION_PROFILE:false}
    expose-credentials: ${APP_MOCK_AUTH_EXPOSE_CREDENTIALS:false}
  attachments:
    max-file-size-bytes: ${APP_ATTACHMENTS_MAX_FILE_SIZE_BYTES:10485760}
  product-creation:
    ai-document-access-ttl-minutes: ${APP_PROJECT_CREATION_AI_DOCUMENT_ACCESS_TTL_MINUTES:10}
    block-unproven-ai-document-usage: ${APP_PROJECT_CREATION_BLOCK_UNPROVEN_AI_DOCUMENT_USAGE:false}
  notifications:
    delivery:
      enabled: ${APP_NOTIFICATION_DELIVERY_ENABLED:true}
      scheduler-enabled: ${APP_NOTIFICATION_DELIVERY_SCHEDULER_ENABLED:true}
      email-enabled: ${APP_NOTIFICATION_EMAIL_ENABLED:false}
      push-enabled: ${APP_NOTIFICATION_PUSH_ENABLED:false}
      email-provider: ${APP_NOTIFICATION_EMAIL_PROVIDER:AUDIT_LOG}
      push-provider: ${APP_NOTIFICATION_PUSH_PROVIDER:AUDIT_LOG}
      email-webhook-url: ${APP_NOTIFICATION_EMAIL_WEBHOOK_URL:}
      push-webhook-url: ${APP_NOTIFICATION_PUSH_WEBHOOK_URL:}
      webhook-secret: ${APP_NOTIFICATION_WEBHOOK_SECRET:}
      webhook-timeout-ms: ${APP_NOTIFICATION_WEBHOOK_TIMEOUT_MS:2500}
      batch-size: ${APP_NOTIFICATION_DELIVERY_BATCH_SIZE:50}
      max-attempts: ${APP_NOTIFICATION_DELIVERY_MAX_ATTEMPTS:3}
      retry-delay-seconds: ${APP_NOTIFICATION_DELIVERY_RETRY_DELAY_SECONDS:300}
      dispatch-fixed-delay-ms: ${APP_NOTIFICATION_DELIVERY_DISPATCH_FIXED_DELAY_MS:60000}
  support:
    sla:
      enabled: ${APP_SUPPORT_SLA_ENABLED:true}
      scheduler-enabled: ${APP_SUPPORT_SLA_SCHEDULER_ENABLED:true}
      due-soon-days: ${APP_SUPPORT_SLA_DUE_SOON_DAYS:1}
      scan-fixed-delay-ms: ${APP_SUPPORT_SLA_SCAN_FIXED_DELAY_MS:900000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,https://localhost:3000,https://localhost:3001,https://127.0.0.1:3000,https://127.0.0.1:3001}
  security:
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:300}
  integrations:
    webhooks:
      payments:
        secret: ${APP_PAYMENT_WEBHOOK_SECRET:dev-payment-webhook-secret}
      signatures:
        secret: ${APP_SIGNATURE_WEBHOOK_SECRET:dev-signature-webhook-secret}
  scanner:
    scheduler-enabled: ${APP_SCANNER_SCHEDULER_ENABLED:true}
    worker-enabled: ${APP_SCANNER_WORKER_ENABLED:true}
    separate-worker-enabled: ${APP_SCANNER_SEPARATE_WORKER_ENABLED:false}
    poll-fixed-delay-ms: ${APP_SCANNER_POLL_FIXED_DELAY_MS:10000}
    max-attempts: ${APP_SCANNER_MAX_ATTEMPTS:1}
    default-timeout-seconds: ${APP_SCANNER_DEFAULT_TIMEOUT_SECONDS:300}
    work-root: ${APP_SCANNER_WORK_ROOT:}
    max-output-bytes: ${APP_SCANNER_MAX_OUTPUT_BYTES:2000000}
    require-runtime-tool-availability: ${APP_SCANNER_REQUIRE_RUNTIME_TOOL_AVAILABILITY:false}
    runtime-image-name: ${APP_SCANNER_RUNTIME_IMAGE_NAME:produs-scanner-worker}
    runtime-image-tag: ${APP_SCANNER_RUNTIME_IMAGE_TAG:local}
    required-tool-keys: ${APP_SCANNER_REQUIRED_TOOL_KEYS:gitleaks,trufflehog,osv-scanner,semgrep,opengrep,bearer,trivy-fs,checkov,hadolint,kics,kube-linter,syft,grype,trivy-image,lighthouse,zap-baseline,testssl,nuclei-safe}
    storage:
      raw-artifact-retention-days: ${APP_SCANNER_RAW_ARTIFACT_RETENTION_DAYS:90}
      import-payload-retention-days: ${APP_SCANNER_IMPORT_PAYLOAD_RETENTION_DAYS:90}
      evidence-artifact-retention-days: ${APP_SCANNER_EVIDENCE_ARTIFACT_RETENTION_DAYS:365}
      retention-cleanup-enabled: ${APP_SCANNER_RETENTION_CLEANUP_ENABLED:false}
      export-enabled: ${APP_SCANNER_EVIDENCE_EXPORT_ENABLED:true}
      signed-url-duration-seconds: ${APP_SCANNER_SIGNED_URL_DURATION_SECONDS:900}
    providers:
      github:
        enabled: ${APP_SCANNER_GITHUB_ENABLED:false}
        app-id: ${APP_SCANNER_GITHUB_APP_ID:}
        client-id: ${APP_SCANNER_GITHUB_CLIENT_ID:}
        client-secret: ${APP_SCANNER_GITHUB_CLIENT_SECRET:}
        private-key-path: ${APP_SCANNER_GITHUB_PRIVATE_KEY_PATH:}
        private-key-base64: ${APP_SCANNER_GITHUB_PRIVATE_KEY_BASE64:}
        webhook-secret: ${APP_SCANNER_GITHUB_WEBHOOK_SECRET:}
        install-url: ${APP_SCANNER_GITHUB_INSTALL_URL:}
        callback-url: ${APP_SCANNER_GITHUB_CALLBACK_URL:}
        api-base-url: ${APP_SCANNER_GITHUB_API_BASE_URL:https://api.github.com}
      gitlab:
        enabled: ${APP_SCANNER_GITLAB_ENABLED:false}
        client-id: ${APP_SCANNER_GITLAB_CLIENT_ID:}
        client-secret: ${APP_SCANNER_GITLAB_CLIENT_SECRET:}
        redirect-uri: ${APP_SCANNER_GITLAB_REDIRECT_URI:}
        webhook-secret: ${APP_SCANNER_GITLAB_WEBHOOK_SECRET:}
        base-url: ${APP_SCANNER_GITLAB_BASE_URL:https://gitlab.com}

produs:
  mcp:
    tool-profile: ${PRODUS_MCP_TOOL_PROFILE:loomai-productization}
    require-auth: ${PRODUS_MCP_REQUIRE_AUTH:false}
    api-key: ${PRODUS_MCP_API_KEY:}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    public-url: ${AWS_S3_PUBLIC_URL:}
    region: ${AWS_S3_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET:produs}
    access-key: ${AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY:minioadmin}}
    secret-key: ${AWS_SECRET_ACCESS_KEY:${AWS_SECRET_KEY:minioadmin}}
    create-bucket-if-missing: ${AWS_S3_CREATE_BUCKET_IF_MISSING:false}
    presigned-url-duration: 900

loomai:
  assignment-url: ${LOOMAI_ASSIGNMENT_URL:}
  assignment-api-key: ${LOOMAI_ASSIGNMENT_API_KEY:}
  assignment-api-key-header-name: ${LOOMAI_ASSIGNMENT_API_KEY_HEADER_NAME:X-PLATFORM-API-KEY}
  assignment-cache-ttl-seconds: ${LOOMAI_ASSIGNMENT_CACHE_TTL_SECONDS:300}
  base-url: ${LOOMAI_BASE_URL:}
  api-key: ${LOOMAI_API_KEY:}
  integration-mode: ${LOOMAI_INTEGRATION_MODE:BACKEND_MEDIATED_PRIVATE_RUNTIME}
  auth-mode: ${LOOMAI_AUTH_MODE:PRIVATE_RUNTIME_ASSERTION}
  api-key-header-name: ${LOOMAI_API_KEY_HEADER_NAME:X-PLATFORM-API-KEY}
  runtime-api-key: ${LOOMAI_RUNTIME_API_KEY:}
  runtime-api-key-header-name: ${LOOMAI_RUNTIME_API_KEY_HEADER_NAME:X-AIFABRIC-RUNTIME-API-KEY}
  runtime-authorization-header-name: ${LOOMAI_RUNTIME_AUTHORIZATION_HEADER_NAME:${LOOMAI_ASSERTION_AUTHORIZATION_HEADER:X-AIFABRIC-RUNTIME-AUTHORIZATION}}
  assertion-issuer: ${LOOMAI_ASSERTION_ISSUER:}
  assertion-audience: ${LOOMAI_ASSERTION_AUDIENCE:}
  assertion-deployment-id: ${LOOMAI_ASSERTION_DEPLOYMENT_ID:}
  assertion-customer-id: ${LOOMAI_ASSERTION_CUSTOMER_ID:produs-staging}
  assertion-tenant-id: ${LOOMAI_ASSERTION_TENANT_ID:}
  assertion-signing-algorithm: ${LOOMAI_ASSERTION_SIGNING_ALGORITHM:HS256}
  assertion-signing-secret: ${LOOMAI_ASSERTION_SIGNING_SECRET:}
  assertion-private-key-path: ${LOOMAI_ASSERTION_PRIVATE_KEY_PATH:}
  assertion-ttl-seconds: ${LOOMAI_ASSERTION_TTL_SECONDS:300}
  assertion-scopes: "${LOOMAI_ASSERTION_SCOPES:chat:query,chat:suggestions,chat:conversations}"
  default-mode: ${LOOMAI_DEFAULT_MODE:thinker}
  default-position: ${LOOMAI_DEFAULT_POSITION:productization}
  enabled: ${LOOMAI_ENABLED:false}
  environment: ${LOOMAI_ENVIRONMENT:local}
  timeout-ms: ${LOOMAI_TIMEOUT_MS:30000}
  assistant-session-path: ${LOOMAI_ASSISTANT_SESSION_PATH:/api/public/chat/session}
  assistant-query-path: ${LOOMAI_ASSISTANT_QUERY_PATH:/api/chat/me/query}
  assistant-query-once-path: ${LOOMAI_ASSISTANT_QUERY_ONCE_PATH:/api/chat/me/query-once}
  assistant-suggestions-path: ${LOOMAI_ASSISTANT_SUGGESTIONS_PATH:/api/chat/me/suggestions}
  auth-context-path: ${LOOMAI_AUTH_CONTEXT_PATH:/api/chat/me/auth-context}
  data-sync-batch-path: ${LOOMAI_DATA_SYNC_BATCH_PATH:/api/ai/data-sync/batch}
  data-sync-delete-path: ${LOOMAI_DATA_SYNC_DELETE_PATH:/api/ai/data-sync/delete}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

logging:
  level:
    root: INFO
    com.produs: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  mock-auth:
    enabled: true

logging:
  level:
    root: INFO
    com.produs: DEBUG
