server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: produs-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/produs}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  api-key: ${SUPABASE_API_KEY:your-anon-key}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}

app:
  mock-auth:
    enabled: false
  attachments:
    max-file-size-bytes: ${APP_ATTACHMENTS_MAX_FILE_SIZE_BYTES:10485760}
  notifications:
    delivery:
      enabled: ${APP_NOTIFICATION_DELIVERY_ENABLED:true}
      scheduler-enabled: ${APP_NOTIFICATION_DELIVERY_SCHEDULER_ENABLED:true}
      email-enabled: ${APP_NOTIFICATION_EMAIL_ENABLED:false}
      push-enabled: ${APP_NOTIFICATION_PUSH_ENABLED:false}
      batch-size: ${APP_NOTIFICATION_DELIVERY_BATCH_SIZE:50}
      max-attempts: ${APP_NOTIFICATION_DELIVERY_MAX_ATTEMPTS:3}
      retry-delay-seconds: ${APP_NOTIFICATION_DELIVERY_RETRY_DELAY_SECONDS:300}
      dispatch-fixed-delay-ms: ${APP_NOTIFICATION_DELIVERY_DISPATCH_FIXED_DELAY_MS:60000}
  support:
    sla:
      enabled: ${APP_SUPPORT_SLA_ENABLED:true}
      scheduler-enabled: ${APP_SUPPORT_SLA_SCHEDULER_ENABLED:true}
      due-soon-days: ${APP_SUPPORT_SLA_DUE_SOON_DAYS:1}
      scan-fixed-delay-ms: ${APP_SUPPORT_SLA_SCAN_FIXED_DELAY_MS:900000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,https://localhost:3000,https://localhost:3001,https://127.0.0.1:3000,https://127.0.0.1:3001}
  security:
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:300}
  integrations:
    webhooks:
      payments:
        secret: ${APP_PAYMENT_WEBHOOK_SECRET:dev-payment-webhook-secret}
      signatures:
        secret: ${APP_SIGNATURE_WEBHOOK_SECRET:dev-signature-webhook-secret}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    public-url: ${AWS_S3_PUBLIC_URL:}
    region: ${AWS_S3_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET:produs}
    access-key: ${AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY:minioadmin}}
    secret-key: ${AWS_SECRET_ACCESS_KEY:${AWS_SECRET_KEY:minioadmin}}
    create-bucket-if-missing: ${AWS_S3_CREATE_BUCKET_IF_MISSING:false}
    presigned-url-duration: 900

loomai:
  base-url: ${LOOMAI_BASE_URL:}
  api-key: ${LOOMAI_API_KEY:}
  enabled: ${LOOMAI_ENABLED:false}
  timeout-ms: ${LOOMAI_TIMEOUT_MS:2500}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

logging:
  level:
    root: INFO
    com.produs: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  mock-auth:
    enabled: true

logging:
  level:
    root: INFO
    com.produs: DEBUG
