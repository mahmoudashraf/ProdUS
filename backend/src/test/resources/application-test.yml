spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  liquibase:
    enabled: false

supabase:
  url: https://test-project.supabase.co
  api-key: test-anon-key
  service-role-key: test-service-role-key

app:
  mock-auth:
    enabled: true
  notifications:
    delivery:
      enabled: true
      scheduler-enabled: false
      email-enabled: true
      push-enabled: false
  support:
    sla:
      enabled: true
      scheduler-enabled: false
      due-soon-days: 1
  security:
    rate-limit:
      enabled: false
  integrations:
    webhooks:
      payments:
        secret: test-payment-webhook-secret
      signatures:
        secret: test-signature-webhook-secret

aws:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket: test-bucket
    access-key: test-access-key
    secret-key: test-secret-key
    presigned-url-duration: 900

logging:
  level:
    root: WARN
    com.produs: DEBUG
