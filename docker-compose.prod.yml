version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: produs-backend
    environment:
      # Supabase Configuration
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_API_KEY: ${SUPABASE_API_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # Database Configuration (PostgreSQL)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      
      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # AWS S3 Configuration (PRODUCTION)
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_CREATE_BUCKET_IF_MISSING: ${AWS_S3_CREATE_BUCKET_IF_MISSING:-false}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      
      # Server Configuration
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # MCP Server for AI assistant integrations
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: produs-mcp-server
    environment:
      PRODUS_API_BASE_URL: ${PRODUS_API_BASE_URL:-http://backend:8080/api}
      PRODUS_MCP_ALLOWED_ORIGINS: ${PRODUS_MCP_ALLOWED_ORIGINS}
      PRODUS_MCP_ALLOWED_HOSTS: ${PRODUS_MCP_ALLOWED_HOSTS:-}
      PRODUS_MCP_REQUIRE_AUTH: ${PRODUS_MCP_REQUIRE_AUTH:-true}
      PRODUS_MCP_LOG_LEVEL: ${PRODUS_MCP_LOG_LEVEL:-info}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_MOCK_AUTH_ENABLED: ${NEXT_PUBLIC_MOCK_AUTH_ENABLED:-false}
        NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
    container_name: produs-frontend
    environment:
      # Supabase Configuration
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      
      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
      
      # Production Features
      NEXT_PUBLIC_MOCK_AUTH_ENABLED: ${NEXT_PUBLIC_MOCK_AUTH_ENABLED:-false}
      NEXT_PUBLIC_DEBUG_MODE: ${NEXT_PUBLIC_DEBUG_MODE:-false}
      NEXT_PUBLIC_ENABLE_MOCK_USER_TESTER: ${NEXT_PUBLIC_ENABLE_MOCK_USER_TESTER:-false}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: produs-network
